<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeavePal Test</title>
</head>
<body>
    <h1>LeavePal Functionality Test</h1>
    <div id="test-results"></div>

    <script>
        // Test the leave application system
        function runTests() {
            const results = document.getElementById('test-results');

            // Test 1: Initialize leave balances
            if (!localStorage.getItem('leaveBalances')) {
                const initialBalances = {
                    sick: { available: 12, booked: 0 },
                    casual: { available: 15, booked: 0 },
                    lop: { booked: 0 }
                };
                localStorage.setItem('leaveBalances', JSON.stringify(initialBalances));
                results.innerHTML += '<p>✅ Leave balances initialized</p>';
            }

            // Test 2: Create a sample leave application
            const leaveApplication = {
                id: Date.now().toString(),
                employeeId: 'TR-505',
                employeeName: 'Ronaldo',
                leaveType: 'sick',
                fromDate: '2024-01-15',
                toDate: '2024-01-16',
                duration: 2,
                reason: 'Medical checkup',
                status: 'PENDING',
                appliedDate: new Date().toISOString().split('T')[0]
            };

            let leaveApplications = JSON.parse(localStorage.getItem('leaveApplications')) || [];
            leaveApplications.push(leaveApplication);
            localStorage.setItem('leaveApplications', JSON.stringify(leaveApplications));
            results.innerHTML += '<p>✅ Leave application saved</p>';

            // Test 3: Update leave balances
            let leaveBalances = JSON.parse(localStorage.getItem('leaveBalances'));
            if (leaveApplication.leaveType === 'sick') {
                leaveBalances.sick.booked += leaveApplication.duration;
                leaveBalances.sick.available = Math.max(0, leaveBalances.sick.available - leaveApplication.duration);
            }
            localStorage.setItem('leaveBalances', JSON.stringify(leaveBalances));
            results.innerHTML += '<p>✅ Leave balances updated</p>';

            // Test 4: Display current data
            const applications = JSON.parse(localStorage.getItem('leaveApplications')) || [];
            const balances = JSON.parse(localStorage.getItem('leaveBalances'));

            results.innerHTML += '<h3>Current Leave Applications:</h3>';
            results.innerHTML += '<pre>' + JSON.stringify(applications, null, 2) + '</pre>';

            results.innerHTML += '<h3>Current Leave Balances:</h3>';
            results.innerHTML += '<pre>' + JSON.stringify(balances, null, 2) + '</pre>';

            results.innerHTML += '<p>🎉 All tests completed successfully!</p>';
        }

        // Clear data button
        function clearData() {
            localStorage.removeItem('leaveApplications');
            localStorage.removeItem('leaveBalances');
            document.getElementById('test-results').innerHTML = '<p>🗑️ Data cleared</p>';
        }

        // Run tests on page load
        window.onload = runTests;
    </script>

    <button onclick="runTests()">Run Tests Again</button>
    <button onclick="clearData()">Clear Data</button>
</body>
</html></content>
