spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Keep pool usage small for Supabase free/shared tiers.
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:2}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}

# PgBouncer/transaction-pooler friendly settings.
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Restrict this in production to your deployed frontend URL(s).
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
