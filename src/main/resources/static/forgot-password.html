<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeavePal - Forgot Password</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="employee-theme">
    <div class="forgot-password-container">
        <!-- Left Partition -->
        <div class="left-partition">
            <div class="logo-section">
                <svg width="80" height="80" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="32" height="32" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M12 20L17 25L28 13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1 class="company-name">LeavePal</h1>
            </div>
        </div>

        <!-- Right Partition -->
        <div class="right-partition">
            <div class="forgot-password-content">
                <h2>Forgot password</h2>
                <p>Enter your credentials to receive a password reset request from your administrator.</p>

                <form class="forgot-form" id="forgotForm">
                    <div class="form-group">
                        <label for="email">EMAIL ID</label>
                        <input type="email" id="email" name="email" placeholder="name@company.com" required>
                    </div>

                    <button type="submit" class="send-request-btn">SEND REQUEST</button>
                </form>

                <a href="index.html" class="cancel-btn">CANCEL</a>
            </div>
        </div>
    </div>

    <script src="ui-notifications.js"></script>
    <script src="env.js"></script>
    <script src="api-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
