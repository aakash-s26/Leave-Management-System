<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Admin Details - LeavePal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="dashboard-styles.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <svg width="50" height="50" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="32" height="32" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M12 20L17 25L28 13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="logo-text">LeavePal</span>
            </div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Dashboard
                </a>
                <a href="employee-details.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Employee Details
                </a>
                <a href="leave-tracker.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    Employee Leave Data
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <div class="header-left">
                    <h2>Edit Admin Details</h2>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23D4AF37'/%3E%3Ccircle cx='50' cy='35' r='20' fill='%23000'/%3E%3Cpath d='M20 90 Q20 70 50 70 Q80 70 80 90' fill='%23000'/%3E%3C/svg%3E" alt="Profile" class="profile-img">
                        <span class="user-name">Admin</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-content">
                <div style="display:flex; gap: 10px; margin-bottom: 30px; color: #999; font-size: 13px;">
                    <span>ADMIN</span>
                    <span>›</span>
                    <span>EDIT DETAILS</span>
                </div>
                <div class="leave-form-card" style="padding: 30px; max-width: 720px;">
                    <h3 style="margin-bottom: 25px;">Admin Profile</h3>
                    <form id="editAdminForm">
                        <div class="form-group">
                            <label for="employeeIdInput">Employee ID</label>
                            <input type="text" id="employeeIdInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="emailInput">Email ID</label>
                            <input type="email" id="emailInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="firstNameInput">First Name</label>
                            <input type="text" id="firstNameInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="lastNameInput">Last Name</label>
                            <input type="text" id="lastNameInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="departmentInput">Department</label>
                            <input type="text" id="departmentInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="designationInput">Designation</label>
                            <input type="text" id="designationInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="reportingEmployeeIdInput">Reporting Authority Employee ID</label>
                            <input type="text" id="reportingEmployeeIdInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="phoneInput">Phone Number</label>
                            <input type="text" id="phoneInput" required>
                        </div>
                        <div class="form-buttons" style="margin-top: 30px;">
                            <button type="button" class="cancel-btn" onclick="cancelEdit()">Cancel</button>
                            <button type="submit" class="apply-btn">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="ui-notifications.js"></script>
    <script src="env.js"></script>
    <script src="api-config.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function getAuthHeaders() {
            const user = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            const headers = {
                'Content-Type': 'application/json'
            };
            if (user.token) {
                headers['Authorization'] = `Bearer ${user.token}`;
            }
            return headers;
        }

        function getProfileIdentifier(user) {
            return user.username || user.employeeId || user.emailId || user.email || '';
        }

        function setFieldValue(inputId, value) {
            const input = document.getElementById(inputId);
            if (input) {
                input.value = value || '';
            }
        }

        async function loadAdminProfile(identifier) {
            if (!identifier) {
                window.location.href = 'index.html';
                return;
            }

            const response = await fetch(`/api/users/${encodeURIComponent(identifier)}`, {
                headers: getAuthHeaders()
            });

            if (!response.ok) {
                window.location.href = 'index.html';
                return;
            }

            const profile = await response.json();
            setFieldValue('employeeIdInput', profile.employeeId || profile.username || '');
            setFieldValue('emailInput', profile.emailId || '');
            setFieldValue('firstNameInput', profile.firstName || '');
            setFieldValue('lastNameInput', profile.lastName || '');
            setFieldValue('departmentInput', profile.department || '');
            setFieldValue('designationInput', profile.designation || '');
            setFieldValue('reportingEmployeeIdInput', profile.reportingEmployeeId || '');
            setFieldValue('phoneInput', profile.phoneNumber || '');
        }

        function cancelEdit() {
            window.location.href = 'admin-dashboard.html';
        }

        async function updateAdminProfile(identifier) {
            const response = await fetch(`/api/users/${encodeURIComponent(identifier)}`, {
                method: 'PUT',
                headers: getAuthHeaders(),
                body: JSON.stringify({
                    phoneNumber: document.getElementById('phoneInput').value || ''
                })
            });

            if (response.ok) {
                const updatedProfile = await response.json();
                const existingUser = JSON.parse(localStorage.getItem('loggedInUser')) || {};
                const preservedToken = existingUser.token;
                const mergedProfile = { ...existingUser, ...updatedProfile, token: preservedToken };
                localStorage.setItem('loggedInUser', JSON.stringify(mergedProfile));
                if (window.showTopRightNotification) {
                    window.showTopRightNotification('Admin profile updated successfully!', 'success');
                }
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 800);
            } else {
                const message = await response.text();
                if (window.showTopRightNotification) {
                    window.showTopRightNotification(message || 'Unable to save admin details.', 'error');
                }
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            if (!loggedInUser || String(loggedInUser.role || '').toLowerCase() !== 'admin') {
                window.location.href = 'index.html';
                return;
            }

            const fullName = `${loggedInUser.firstName || ''} ${loggedInUser.lastName || ''}`.trim() || 'Admin';
            document.querySelectorAll('.user-name').forEach(el => el.textContent = fullName);
            const profileIdentifier = getProfileIdentifier(loggedInUser);

            await loadAdminProfile(profileIdentifier);

            const editAdminForm = document.getElementById('editAdminForm');
            if (editAdminForm) {
                editAdminForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    await updateAdminProfile(profileIdentifier);
                });
            }
        });
    </script>
</body>
</html>
