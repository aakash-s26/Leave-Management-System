<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeavePal Test</title>
</head>
<body>
    <h1>LeavePal Functionality Test</h1>
    <div id="test-results"></div>

    <script src="env.js"></script>
    <script src="api-config.js"></script>
    <script>
        function getAuthHeaders() {
            const user = JSON.parse(localStorage.getItem('loggedInUser') || '{}');
            const headers = {
                'Content-Type': 'application/json'
            };
            if (user.token) {
                headers['Authorization'] = `Bearer ${user.token}`;
            }
            return headers;
        }

        async function runTests() {
            const results = document.getElementById('test-results');
            results.innerHTML = '';
            const user = JSON.parse(localStorage.getItem('loggedInUser') || 'null');

            if (!user || !user.token) {
                results.innerHTML = '<p>Sign in first to run API tests.</p>';
                return;
            }

            try {
                const trackerResponse = await fetch(`/api/leave-tracker/${encodeURIComponent(user.employeeId || '')}`, {
                    headers: getAuthHeaders()
                });
                if (trackerResponse.ok) {
                    const tracker = await trackerResponse.json();
                    results.innerHTML += '<p>✅ Leave tracker API reachable</p>';
                    results.innerHTML += '<pre>' + JSON.stringify(tracker, null, 2) + '</pre>';
                } else {
                    results.innerHTML += '<p>⚠️ Leave tracker unavailable for this user</p>';
                }
            } catch (error) {
                results.innerHTML += '<p>❌ Leave tracker API test failed</p>';
            }

            try {
                const myRequestsResponse = await fetch('/api/leave-applications/my', {
                    headers: getAuthHeaders()
                });
                const requests = myRequestsResponse.ok ? await myRequestsResponse.json() : [];
                results.innerHTML += '<p>✅ Leave applications API reachable</p>';
                results.innerHTML += '<pre>' + JSON.stringify(requests.slice(0, 5), null, 2) + '</pre>';
            } catch (error) {
                results.innerHTML += '<p>❌ Leave applications API test failed</p>';
            }

            try {
                const notificationsResponse = await fetch('/api/notifications/my', {
                    headers: getAuthHeaders()
                });
                const notifications = notificationsResponse.ok ? await notificationsResponse.json() : [];
                results.innerHTML += '<p>✅ Notifications API reachable</p>';
                results.innerHTML += '<pre>' + JSON.stringify(notifications.slice(0, 5), null, 2) + '</pre>';
            } catch (error) {
                results.innerHTML += '<p>❌ Notifications API test failed</p>';
            }

            results.innerHTML += '<p>🎉 API-only tests completed.</p>';
        }

        window.onload = runTests;
    </script>

    <button onclick="runTests()">Run Tests Again</button>
</body>
</html>
