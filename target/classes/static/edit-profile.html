<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - LeavePal</title>
    <link rel="stylesheet" href="dashboard-styles.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <svg width="50" height="50" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="32" height="32" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M12 20L17 25L28 13" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="logo-text">LeavePal</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Dashboard
                </a>
                <a href="employee-details.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Employee Details
                </a>
                <a href="leave-tracker.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    Leave Tracker
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <div class="header-left">
                    <h2>Edit Profile</h2>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23D4AF37'/%3E%3Ccircle cx='50' cy='35' r='20' fill='%23000'/%3E%3Cpath d='M20 90 Q20 70 50 70 Q80 70 80 90' fill='%23000'/%3E%3C/svg%3E" alt="Profile" class="profile-img">
                        <span class="user-name">Ronaldo</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-content">
                <div style="display:flex; gap: 10px; margin-bottom: 30px; color: #999; font-size: 13px;">
                    <span>EMPLOYEE</span>
                    <span>›</span>
                    <span>EDIT PROFILE</span>
                </div>
                <div class="leave-form-card" style="padding: 30px;">
                    <h3 style="margin-bottom: 25px;">Basic Info</h3>
                    <form id="editProfileForm">
                        <div class="form-group">
                            <label for="employeeIdInput">Employee ID</label>
                            <input type="text" id="employeeIdInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="emailInput">Email ID</label>
                            <input type="email" id="emailInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="firstNameInput">First Name</label>
                            <input type="text" id="firstNameInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="lastNameInput">Last Name</label>
                            <input type="text" id="lastNameInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="departmentInput">Department</label>
                            <input type="text" id="departmentInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="designationInput">Designation</label>
                            <input type="text" id="designationInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="reportingEmployeeIdInput">Reporting Authority Employee ID</label>
                            <input type="text" id="reportingEmployeeIdInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="locationInput">Location</label>
                            <input type="text" id="locationInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="joiningInput">Date of Joining</label>
                            <input type="text" id="joiningInput" disabled>
                        </div>
                        <div class="form-group">
                            <label for="phoneInput">Phone Number</label>
                            <input type="text" id="phoneInput" required>
                        </div>
                        <div class="form-group">
                            <label for="nationalityInput">Nationality</label>
                            <input type="text" id="nationalityInput" required>
                        </div>
                        <div class="form-group">
                            <label for="bloodGroupInput">Blood Group</label>
                            <input type="text" id="bloodGroupInput" required>
                        </div>
                        <div class="form-group">
                            <label for="maritalStatusInput">Marital Status</label>
                            <input type="text" id="maritalStatusInput" required>
                        </div>
                        <div class="form-group">
                            <label for="dobInput">Date of Birth</label>
                            <input type="text" id="dobInput" required>
                        </div>
                        <div class="form-group">
                            <label for="personalEmailInput">Personal Email</label>
                            <input type="email" id="personalEmailInput" required>
                        </div>
                        <div class="form-group">
                            <label for="genderInput">Gender</label>
                            <input type="text" id="genderInput" required>
                        </div>
                        <div class="form-group">
                            <label for="addressInput">Address</label>
                            <input type="text" id="addressInput" required>
                        </div>
                        <div class="form-buttons" style="margin-top: 30px;">
                            <button type="button" class="cancel-btn" onclick="cancelEdit()">Cancel</button>
                            <button type="submit" class="apply-btn">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function getProfileDefaults() {
            return {
                employeeId: 'TR-505',
                emailId: 'ronaldo@leavepal.com',
                firstName: 'Ronaldo',
                lastName: '',
                department: 'Banking',
                designation: 'Intern',
                reporting: 'Ramesh Kumar',
                location: 'Chennai',
                joining: '01-Jan-2024',
                phoneNumber: '+91 98765 43210',
                nationality: 'Indian',
                bloodGroup: 'O +ve',
                maritalStatus: 'Unmarried',
                dob: '15-May-2001',
                personalEmail: 'ronaldo.personal@email.com',
                gender: 'Male',
                address: 'No. 12, Golden Street, Adyar, Chennai - 600020'
            };
        }

        async function loadEditProfile() {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            if (!loggedInUser.username) {
                window.location.href = 'index.html';
                return;
            }

            const response = await fetch(`/api/users/${encodeURIComponent(loggedInUser.username)}`, {
                headers: getAuthHeaders()
            });
            if (!response.ok) {
                window.location.href = 'index.html';
                return;
            }

            const profile = await response.json();
            document.getElementById('employeeIdInput').value = profile.employeeId || profile.username || '';
            document.getElementById('emailInput').value = profile.emailId || '';
            document.getElementById('firstNameInput').value = profile.firstName || '';
            document.getElementById('lastNameInput').value = profile.lastName || '';
            document.getElementById('departmentInput').value = profile.department || '';
            document.getElementById('designationInput').value = profile.designation || '';
            document.getElementById('reportingEmployeeIdInput').value = profile.reportingEmployeeId || '';
            document.getElementById('locationInput').value = profile.location || '';
            document.getElementById('joiningInput').value = profile.joining || '';
            document.getElementById('phoneInput').value = profile.phoneNumber || '';
            document.getElementById('nationalityInput').value = profile.nationality || '';
            document.getElementById('bloodGroupInput').value = profile.bloodGroup || '';
            document.getElementById('maritalStatusInput').value = profile.maritalStatus || '';
            document.getElementById('dobInput').value = profile.dob || '';
            document.getElementById('personalEmailInput').value = profile.personalEmail || '';
            document.getElementById('genderInput').value = profile.gender || '';
            document.getElementById('addressInput').value = profile.address || '';
        }

        function cancelEdit() {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            if (loggedInUser.role && loggedInUser.role.toLowerCase() === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        async function updateProfile(username) {
            const profile = {
                phoneNumber: document.getElementById('phoneInput').value,
                nationality: document.getElementById('nationalityInput').value,
                bloodGroup: document.getElementById('bloodGroupInput').value,
                maritalStatus: document.getElementById('maritalStatusInput').value,
                dob: document.getElementById('dobInput').value,
                personalEmail: document.getElementById('personalEmailInput').value,
                gender: document.getElementById('genderInput').value,
                address: document.getElementById('addressInput').value
            };

            const response = await fetch(`/api/users/${encodeURIComponent(username)}`, {
                method: 'PUT',
                headers: getAuthHeaders(),
                body: JSON.stringify(profile)
            });

            if (response.ok) {
                const updatedProfile = await response.json();
                localStorage.setItem('loggedInUser', JSON.stringify(updatedProfile));
                if (updatedProfile.role && updatedProfile.role.toLowerCase() === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                const message = await response.text();
                alert(message || 'Unable to save profile.');
            }
        }

        function getAuthHeaders() {
            const user = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            const headers = {
                'Content-Type': 'application/json'
            };
            if (user.token) {
                headers['Authorization'] = `Bearer ${user.token}`;
            }
            return headers;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser')) || {};
            if (!loggedInUser.username) {
                window.location.href = 'index.html';
                return;
            }

            const fullName = `${loggedInUser.firstName || ''} ${loggedInUser.lastName || ''}`.trim() || 'Employee';
            document.querySelector('.user-name').textContent = fullName;

            await loadEditProfile(loggedInUser.username);

            const editProfileForm = document.getElementById('editProfileForm');
            editProfileForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                await updateProfile(loggedInUser.username);
            });
        });
    </script>
</body>
</html>
