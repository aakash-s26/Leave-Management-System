<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeavePal - Login</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <!-- Left Partition -->
        <div class="left-partition">
            <div class="logo-section">
                <img src="logo.png" alt="LeavePal Logo" class="logo-img">
                <h1 class="company-name">LeavePal</h1>
            </div>
        </div>

        <!-- Right Partition -->
        <div class="right-partition">
            <div class="login-content">
                <div class="tabs">
                    <button class="tab-btn employee-tab active" data-role="workforce">MANAGER / EMPLOYEE</button>
                    <button class="tab-btn admin-tab" data-role="admin">ADMIN</button>
                </div>

                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="username">USERNAME</label>
                        <input type="text" id="username" name="username" placeholder="" required>
                    </div>

                    <div class="form-group">
                        <label for="password">PASSWORD</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="password" name="password" placeholder="" required>
                            <button type="button" class="toggle-password" id="togglePassword">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="forgot-password" id="forgotPasswordSection">
                        <a href="forgot-password.html">FORGOT PASSWORD?</a>
                    </div>

                    <button type="submit" class="login-btn">LOGIN</button>
                </form>
            </div>
        </div>
    </div>

    <script src="ui-notifications.js"></script>
    <script src="script.js"></script>
</body>
</html>
